<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>房产趋势看板</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--bg);color:var(--t);line-height:1.6}
.D{max-width:1440px;margin:0 auto;padding:12px;padding-bottom:calc(var(--nh)+20px)}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--bd)}
.hdr h1{font-size:17px;font-weight:700}.hdr .sub{font-size:10px;color:var(--mu);margin-top:1px}
.hdr .db{background:var(--t);color:var(--bg);padding:3px 10px;border-radius:16px;font-size:10px;font-family:var(--mo);white-space:nowrap}
.fb{position:sticky;top:0;z-index:100;background:var(--bg);padding:8px 0;margin-bottom:8px;border-bottom:1px solid var(--bd)}
.fr{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.fb select,.fb input{padding:7px 6px;border:1px solid var(--bd);border-radius:8px;font-size:13px;background:var(--card);color:var(--t);font-family:var(--f);outline:none;flex:1;min-width:0}
.fb select:focus,.fb input:focus{border-color:var(--b)}
.fbtn{padding:7px 12px;border:none;border-radius:8px;font-size:13px;background:var(--b);color:#fff;cursor:pointer;white-space:nowrap;font-family:var(--f);font-weight:500}
.fbtn:active{opacity:.8}
.sb{display:flex;align-items:center;gap:6px;margin-top:5px;font-size:12px;color:var(--t2);flex-wrap:wrap}
.sn{font-size:15px;font-weight:700;color:var(--b)}
.rb{font-size:11px;color:var(--b);background:var(--bbg);border:none;border-radius:12px;padding:2px 8px;cursor:pointer;font-family:var(--f)}
.fc{font-size:11px;color:var(--mu);white-space:nowrap}
.ttg{display:inline-flex;gap:3px;margin-left:auto}.ttg button{padding:3px 10px;border:1px solid var(--bd);border-radius:12px;font-size:11px;background:var(--card);cursor:pointer;font-family:var(--f);color:var(--mu)}.ttg button.act{background:var(--b);color:#fff;border-color:var(--b)}
.S{margin-bottom:18px}.SH{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:6px 0;user-select:none}
.ST{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.stg{font-size:18px;color:var(--mu);transition:transform .2s}.stg.cl{transform:rotate(-90deg)}
.SB{overflow:hidden;transition:max-height .3s ease}.SB.cl{max-height:0!important}
.ins{background:linear-gradient(135deg,#f8f9fa,#fff);border-left:3px solid var(--b);padding:8px 10px;margin-bottom:10px;border-radius:0 8px 8px 0;font-size:11px;color:var(--t2);line-height:1.7}
.ins strong{color:var(--t)}.it{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;margin-right:4px;vertical-align:middle}
.tp{background:var(--gbg);color:var(--g)}.tn{background:var(--ybg);color:var(--warm)}.tng{background:var(--rbg);color:var(--r)}.ti{background:var(--bbg);color:var(--b)}
.cb{background:var(--card);border-radius:var(--rd);padding:14px;box-shadow:var(--sh);border:1px solid var(--bd)}.cb canvas{max-height:260px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.cmg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px}
.cm{background:var(--card);border-radius:8px;padding:8px 10px;cursor:pointer;box-shadow:var(--sh);border:2px solid transparent;transition:all .2s}
.cm:hover{box-shadow:var(--sh2);border-color:var(--b)}.cm.act{border-color:var(--b);background:var(--bbg)}
.cm .cmt{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}.cm .cmn{font-size:13px;font-weight:700}
.cm .cmi{font-size:9px;color:var(--mu)}.cm .cmp{font-size:15px;font-weight:700;font-family:var(--mo);margin-bottom:1px}
.cm .cmr{display:flex;justify-content:space-between;font-size:10px}
.cm .cms{height:28px;margin-top:3px}.cm .cms canvas{max-height:28px}
.tb{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.th{background:#fde8e8;color:var(--hot)}.tw{background:var(--ybg);color:var(--warm)}.tc{background:#e3f2fd;color:var(--cold)}
.showMore{width:100%;padding:8px;border:1px dashed var(--bd);border-radius:8px;background:none;font-size:12px;color:var(--b);cursor:pointer;font-family:var(--f);margin-top:6px}
.cp{background:var(--card);border-radius:var(--rd);padding:14px;box-shadow:var(--sh);border:1px solid var(--bd);border-left:3px solid var(--b);margin-bottom:12px}
.cp .cptop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.cp .cpn{font-size:18px;font-weight:700}.cp .cpm{font-size:11px;color:var(--mu)}
.cp .cppr{display:flex;align-items:baseline;gap:6px;margin-bottom:6px}
.cp .cpp{font-size:28px;font-weight:700;font-family:var(--mo);letter-spacing:-1px}.cp .cpu{font-size:11px;color:var(--mu)}
.cp .cpe{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap;font-size:10px;color:var(--mu)}.cp .cpe b{color:var(--t2);font-weight:600}

.hzg{display:block}
.hzfb{margin-bottom:10px;display:flex;gap:8px;align-items:center;padding:8px 10px;background:var(--bg);border-radius:8px}.hzfb select{padding:5px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;background:var(--card);font-family:var(--f);outline:none;cursor:pointer}.hzfb select:hover{border-color:var(--b)}
.ldsp{width:24px;height:24px;border:2px solid var(--bd);border-top-color:var(--b);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}@keyframes spin{to{transform:rotate(360deg)}}
.hzt{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:8px;overflow:hidden;box-shadow:var(--sh);border:1px solid var(--bd)}
.hzt thead{background:var(--bg)}

.hzt td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
.hzt tbody tr:last-child td{border-bottom:none}
.hztr{cursor:pointer;transition:background .15s}.hztr:hover{background:rgba(41,128,185,.06)}
.hzi{color:var(--mu);font-size:10px;font-family:var(--mo);width:28px;text-align:center}
.hztn{font-weight:600;font-size:12px}
.hztd{color:var(--mu);font-size:11px}
.hztv{font-family:var(--mo);font-size:12px;white-space:nowrap}
.hzep{background:var(--card);border-radius:8px;padding:14px;box-shadow:var(--sh);border:1px solid var(--bd);margin-top:10px}
.hzeh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.showMore{display:block;width:100%;padding:10px;margin-top:10px;border:1px dashed var(--bd);border-radius:8px;background:var(--card);color:var(--mu);font-size:12px;cursor:pointer;font-family:var(--f);text-align:center;transition:all .15s}.showMore:hover{background:rgba(41,128,185,.06);color:var(--b);border-color:var(--b)}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.sc{background:var(--card);border-radius:var(--rd);padding:10px;box-shadow:var(--sh);border:1px solid var(--bd)}
.sc .sn2{font-size:12px;font-weight:600;margin-bottom:4px}
.sr{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:11px}
.sd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.so{background:var(--g);box-shadow:0 0 5px rgba(45,140,78,.4)}.sp{background:var(--y);box-shadow:0 0 5px rgba(230,162,60,.3)}.sf{background:#ddd}
.st2{color:var(--t2)}.sdt{font-size:10px;color:var(--mu);padding-left:16px;margin-bottom:2px}
.sleg{display:flex;gap:10px;font-size:10px;color:var(--mu);margin-bottom:8px;flex-wrap:wrap;padding:5px 8px;background:var(--bg);border-radius:6px}
.sleg span{display:flex;align-items:center;gap:3px}
.rkc{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.rkt{background:var(--card);border-radius:var(--rd);padding:12px;box-shadow:var(--sh);border:1px solid var(--bd);overflow-x:auto}
.rkt h4{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--t2)}
.rkt table{width:100%;border-collapse:collapse;font-size:11px}
.rkt th{text-align:left;padding:4px 5px;border-bottom:1px solid var(--bd);color:var(--mu);font-weight:500}
.rkt td{padding:5px;border-bottom:1px solid #f5f5f5;white-space:nowrap;vertical-align:middle}.rkt tr.hl{background:var(--bbg)}
.rktm{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rn{font-family:var(--mo);font-weight:700;width:18px;display:inline-block}.r1{color:#e6a23c}.r2{color:#909399}.r3{color:#b87333}
.vpc{background:var(--card);border-radius:var(--rd);padding:12px;box-shadow:var(--sh);border:1px solid var(--bd)}.vpc canvas{max-height:200px}
.vu{color:var(--g);font-weight:600;font-family:var(--mo)}.vd{color:var(--r);font-weight:600;font-family:var(--mo)}
.meth{background:var(--card);border-radius:var(--rd);padding:14px;box-shadow:var(--sh);border:1px solid var(--bd);font-size:12px;color:var(--t2);line-height:1.9}
.meth h4{font-size:14px;color:var(--t);margin:10px 0 6px;font-weight:700}.meth h4:first-child{margin-top:0}
.meth h5{font-size:12px;font-weight:600;margin:8px 0 4px;color:var(--t)}
.meth .ex{background:var(--bg);padding:10px;border-radius:8px;margin:6px 0;font-size:11px}
.meth .emo{font-size:14px;margin-right:4px}
.foot{text-align:center;font-size:10px;color:var(--mu);padding:14px 0 8px;border-top:1px solid var(--bd);margin-top:20px}
.bn{position:fixed;bottom:0;left:0;right:0;height:var(--nh);background:var(--card);border-top:1px solid var(--bd);display:flex;justify-content:space-around;align-items:center;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--mu);cursor:pointer;padding:4px 8px;border:none;background:none;font-family:var(--f)}.ni.at{color:var(--b)}.ni .nc{font-size:18px}
.lo{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px}
.lo .spinner{width:36px;height:36px;border:3px solid var(--bd);border-top-color:var(--b);border-radius:50%;animation:spin .8s linear infinite}
.docP{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:300;display:none;flex-direction:column}
.docP.show{display:flex}
.docH{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--card)}
.docX{width:32px;height:32px;border:none;background:var(--bg);border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2)}
.docB{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
@keyframes spin{to{transform:rotate(360deg)}}
@media(min-width:901px){.D{padding:20px}.hdr h1{font-size:20px}.bn{display:none}.D{padding-bottom:20px}.cmg{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}}
@media(max-width:900px){.hdr{flex-direction:column;gap:4px;align-items:flex-start}.g2,.g3{grid-template-columns:1fr}.ga{grid-template-columns:1fr 1fr}.sg,.rkc{grid-template-columns:1fr}.cmg{grid-template-columns:repeat(2,1fr)}.cb canvas{max-height:200px}.fb select,.fb input{font-size:14px;padding:8px}.cp .cpms{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.cmg{grid-template-columns:1fr 1fr;gap:5px}.cm{padding:6px 8px}.cm .cmp{font-size:13px}.ga{grid-template-columns:1fr}.hzg{overflow-x:auto}.hzt{font-size:11px}.hzt th,.hzt td{padding:5px 6px}}
</style>
</head>
<body>
<div class="D" id="app"><div class="lo" id="ldO"><div class="spinner"></div><div style="color:var(--mu);font-size:13px">正在加载数据...</div></div></div>
<nav class="bn" id="bN" style="display:none">
  <button class="ni at" onclick="nv('s-ov',this)"><span class="nc">📈</span>走势</button>
  <button class="ni" onclick="nv('s-ct',this)"><span class="nc">🏙️</span>城市</button>
  <button class="ni" onclick="nv('s-pt',this)"><span class="nc">🏢</span>物业</button>
  <button class="ni" onclick="nv('s-sg',this)"><span class="nc">🚦</span>信号</button>
  <button class="ni" onclick="nv('s-rk',this)"><span class="nc">🏆</span>排行</button>
  <button class="ni" onclick="togDoc()"><span class="nc">📖</span>说明</button>
</nav>
<div class="docP" id="docPanel">
  <div class="docH"><span style="font-size:16px;font-weight:700">📖 指标说明</span><button class="docX" onclick="togDoc()">✕</button></div>
  <div class="docB" id="docBody"></div>
</div>
<script>
if(typeof Chart==='undefined'){document.getElementById('ldO').innerHTML='<div style="color:red;text-align:center"><b>图表库加载失败</b><br><small>请刷新页面重试</small></div>';throw new Error('no Chart')}
function nv(id,b){const e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.ni').forEach(n=>n.classList.remove('at'));if(b)b.classList.add('at');const dp=document.getElementById('docPanel');if(dp)dp.classList.remove('show')}
function togDoc(){const dp=document.getElementById('docPanel');dp.classList.toggle('show');document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('at',false))}
function tog(id){const b=document.getElementById(id),t=b.previousElementSibling.querySelector('.stg');b.classList.toggle('cl');t.classList.toggle('cl')}

let D=null,MO=[],MOF=[],NAT={},AC={},APS=[];
let PINNED=[];
let selCity='上海',fProv='',fTier='',fSch='',showAllCities=false,TP=12;
const CI={};function dCI(k){if(CI[k]){CI[k].destroy();delete CI[k]}}function dCIP(p){Object.keys(CI).forEach(k=>{if(k.startsWith(p)){CI[k].destroy();delete CI[k]}})}
const CC=['#e74c3c','#c0392b','#8e44ad','#2980b9','#e67e22','#1abc9c','#34495e','#9b59b6','#d4a017','#16a085','#27ae60','#00bcd4','#607d8b','#ff5722','#4caf50','#795548','#ff9800','#009688','#673ab7','#03a9f4'];
let ci=0;function gC(n){if(n==='上海')return'#e74c3c';if(n==='香港')return'#d4a017';return CC[(ci++)%CC.length]}

async function loadData(){
  const el=document.getElementById('ldO');
  try{const r=await fetch('latest.json');if(!r.ok)throw new Error('HTTP '+r.status);D=await r.json()}
  catch(e1){try{const r=await fetch('data/latest.json');if(!r.ok)throw new Error('HTTP '+r.status);D=await r.json()}
  catch(e2){el.innerHTML=`<div style="color:var(--r);text-align:center"><b>数据加载失败</b><br><small>${e1.message}</small></div>`;return}}
  MOF=D.meta.months;MO=MOF.map(m=>m.slice(2));NAT=D.national;ci=0;
  for(const[n,c]of Object.entries(D.cities)){AC[n]={...c,color:gC(n)}}
  APS=Object.values(AC).map(c=>c.prices);
  renderAll();document.getElementById('bN').style.display='flex';
  PINNED=JSON.parse(localStorage.getItem('pinnedCities')||'["上海"]');
}

function renderDetail(){rPT();rHZ();rAR();rVP()}

function togglePin(name){
  let p=JSON.parse(localStorage.getItem('pinnedCities')||'["上海"]');
  const i=p.indexOf(name);
  if(i>=0){p.splice(i,1)}else{if(p.length>=3)return;p.push(name)}
  localStorage.setItem('pinnedCities',JSON.stringify(p));PINNED=p;rMG();
}

// ===== ALGORITHMS =====
function cC(p,n){const l=p.length,i=l-1-n;return i<0?0:((p[l-1]-p[i])/p[i])*100}
function cSl(p,s,e){return(e<=s||s<0)?0:(p[e]-p[s])/p[s]*100/(e-s)}
function cMo(p){const n=p.length;return n<7?0:cSl(p,n-4,n-1)-cSl(p,n-7,n-4)}
function cTp(p,v){const n=p.length,pm=Math.max(0,Math.min(100,50+cC(p,3)*15));const rv=v.slice(-3).reduce((a,b)=>a+b,0)/3,ps=v.slice(-9,-3);const pv=ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:rv;const vm=Math.max(0,Math.min(100,(pv>0?rv/pv:1)*50));let c=0;const ld=p[n-1]>=p[n-2]?1:-1;for(let i=n-1;i>0;i--){if((p[i]>=p[i-1]?1:-1)===ld)c++;else break}const pe=Math.max(0,Math.min(100,c*12+(ld>0?20:0)));const s=pm*.4+vm*.3+pe*.3;if(s>65)return{s:Math.round(s),l:'热',c:'th'};if(s>35)return{s:Math.round(s),l:'平',c:'tw'};return{s:Math.round(s),l:'寒',c:'tc'}}
function cRS(p,all){const pds=[{m:1,w:.4},{m:3,w:.35},{m:12,w:.25}];let wp=0;pds.forEach(({m,w})=>{const mc=cC(p,Math.min(m,p.length-1)),nc=cC(NAT.prices,Math.min(m,NAT.prices.length-1)),ex=mc-nc;const ae=all.map(q=>cC(q,Math.min(m,q.length-1))-nc).sort((a,b)=>a-b);wp+=(ae.filter(e=>e<=ex).length/ae.length)*100*w});return Math.round(wp)}

// FIX: Signals are now strictly progressive
function dSg(p,v){
  const n=p.length,s={sd:0,st:0,rc:0},d={sd:'',st:'',rc:''};
  // Step1: 止跌 — decline narrowing
  if(n>=4){
    const c1=(p[n-3]-p[n-4])/p[n-4]*100,c2=(p[n-2]-p[n-3])/p[n-3]*100,c3=(p[n-1]-p[n-2])/p[n-2]*100;
    if(c3>c2&&c2>c1){s.sd=1;d.sd=`跌幅连续收窄: ${c1.toFixed(2)}%→${c2.toFixed(2)}%→${c3.toFixed(2)}%`}
    else if(c3>c2){d.sd=`部分收窄: ${c2.toFixed(2)}%→${c3.toFixed(2)}%`}
    else{d.sd=`未收窄: ${c2.toFixed(2)}%→${c3.toFixed(2)}%`}
  }
  // Step2: 走平 — only if 止跌 passed
  if(n>=2){
    const lc=Math.abs((p[n-1]-p[n-2])/p[n-2]*100);
    const av=v.slice(-7,-1).reduce((a,b)=>a+b,0)/Math.max(1,v.slice(-7,-1).length),lv=v[n-1];
    if(s.sd && lc<=.3 && lv>=av*.8){s.st=1;d.st=`波动仅${lc.toFixed(2)}%, 量维持${(lv/av*100).toFixed(0)}%`}
    else{d.st=`波动${lc.toFixed(2)}%${lc>.3?'(>0.3%)':''}, 量${(lv/(av||1)*100).toFixed(0)}%${!s.sd?' [需先止跌]':''}`}
  }
  // Step3: 回升 — only if 走平 passed
  if(n>=3){
    const cl=(p[n-1]-p[n-2])/p[n-2]*100,cp2=(p[n-2]-p[n-3])/p[n-3]*100;
    const av=v.slice(-7,-1).reduce((a,b)=>a+b,0)/Math.max(1,v.slice(-7,-1).length),ma=p.slice(-5).reduce((a,b)=>a+b,0)/5;
    if(s.st && cl>0 && cp2>0 && v[n-1]>av && p[n-1]>ma){s.rc=1;d.rc=`连涨2月 ${cp2.toFixed(2)}%/${cl.toFixed(2)}%, 量价齐升`}
    else{const r=[];if(!s.st)r.push('需先走平');if(cl<=0||cp2<=0)r.push('未连续正涨');if(v[n-1]<=av)r.push('量不足');if(p[n-1]<=ma)r.push('价<MA5');d.rc=r.join('·')}
  }
  return{s,d}
}

function mktJudge(p,v){
  const n=p.length;if(n<6)return{verdict:'数据不足',conf:0,cls:'ti',detail:'',hint:''};
  const m1=cC(p,1),m3=cC(p,3),m6=cC(p,Math.min(6,n-1)),y1=cC(p,Math.min(12,n-1));
  const mo=cMo(p),{s:sg}=dSg(p,v),dx=vpDx(p,v);
  let streak=0,dir=p[n-1]>=p[n-2]?1:-1;
  for(let i=n-1;i>0;i--){if((p[i]>=p[i-1]?1:-1)===dir)streak++;else break}
  if(sg.rc)return{verdict:'趋势性回暖',conf:5,cls:'tp',detail:`量价齐升已确认，连续正涨${streak}月`,hint:'可积极看房'};
  if(sg.st&&mo>0.05)return{verdict:'止稳向好',conf:4,cls:'tp',detail:`价格走平+动量转正(${mo.toFixed(2)}%)，有转折迹象`,hint:'可开始关注'};
  if(sg.st)return{verdict:'底部盘整',conf:3,cls:'tn',detail:'波动极小，等待方向突破',hint:'继续观察1-2月'};
  if(sg.sd&&m1>0)return{verdict:'止跌反弹',conf:3,cls:'tn',detail:'跌幅收窄+最新月转正，需连续确认',hint:'关注下月能否持续'};
  if(sg.sd)return{verdict:'止跌企稳',conf:2,cls:'tn',detail:'跌幅在收窄，尚未转正',hint:'底部信号初现，继续观望'};
  if(m3>0&&m6<-1)return{verdict:'技术性反弹',conf:2,cls:'tn',detail:`短期转正但中期仍跌${m6.toFixed(1)}%，可能超跌反弹`,hint:'不宜追涨，等待确认'};
  if(Math.abs(m3)<.5&&Math.abs(m1)<.3)return{verdict:'窄幅震荡',conf:2,cls:'ti',detail:`近3月波动仅${m3.toFixed(1)}%，方向不明`,hint:'观望等待信号'};
  if(m3<0&&mo>0)return{verdict:'跌幅收窄',conf:2,cls:'tn',detail:`仍在下跌但速度放缓(动量+${mo.toFixed(2)}%)`,hint:'下行减速，留意拐点'};
  if(m3<0&&mo<=0)return{verdict:'持续下行',conf:1,cls:'tng',detail:`近3月${m3.toFixed(1)}%，跌势未减`,hint:'建议等待止跌信号'};
  if(m3>0&&dx.tag==='量价齐升')return{verdict:'健康上行',conf:4,cls:'tp',detail:'涨价有成交支撑，上涨可持续',hint:'较好的入场时机'};
  if(m3>0&&mo>0)return{verdict:'温和上行',conf:3,cls:'tp',detail:`近3月+${m3.toFixed(1)}%，动量仍在加速`,hint:'趋势向好但需确认量能'};
  return{verdict:'方向不明',conf:1,cls:'ti',detail:'多空交织，暂无明确趋势',hint:'观望'}
}

  const tg=[{n:`${selCity}(整体)`,t:'城市',p:d.prices,v:d.volumes}];if(d.property_types)Object.entries(d.property_types).forEach(([n,v])=>tg.push({n,t:'物业',p:v.prices,v:v.volumes}));
  if(d.hot_zones){const hze=Object.entries(d.hot_zones);const top=hze.sort((a,b)=>b[1].prices[b[1].prices.length-1]-a[1].prices[a[1].prices.length-1]).slice(0,8);top.forEach(([n,v])=>tg.push({n,t:'板块',p:v.prices,v:v.volumes}))}
  const onC=tg.filter(x=>dSg(x.p,x.v).s.sd).length,stC=tg.filter(x=>dSg(x.p,x.v).s.st).length,rcC=tg.filter(x=>dSg(x.p,x.v).s.rc).length;
  const tt=tg.length,rcPct=tt?(rcC/tt*100).toFixed(0):0,stPct=tt?(stC/tt*100).toFixed(0):0,sdPct=tt?(onC/tt*100).toFixed(0):0;
  const sgVerdict=rcPct>30?'回暖信号广泛，转折信心较强':stPct>40?'多数走平，等待方向选择':sdPct>40?'止跌信号初现，尚需确认':'下行通道未改，建议继续观望';
  const sgCls=rcPct>30?'tp':stPct>40?'tn':sdPct>40?'tn':'tng';
  if(ins)ins.innerHTML=`<span class="it ${sgCls}">${selCity}信号</span>${tt}个市场：<b>${onC}</b>止跌·<b>${stC}</b>走平·<b>${rcC}</b>回升。<br><b>整体判定：${sgVerdict}</b>`;
  tg.forEach(x=>{const{s,d:dt}=dSg(x.p,x.v);const card=document.createElement('div');card.className='sc';
    card.innerHTML=`<div class="sn2">${x.n} <span style="font-size:10px;color:var(--mu)">${x.t}</span></div><div class="sr"><span class="sd ${s.sd?'so':'sf'}"></span><span class="st2">止跌</span></div><div class="sdt">${dt.sd}</div><div class="sr"><span class="sd ${s.st?'so':s.sd?'sp':'sf'}"></span><span class="st2">走平</span></div><div class="sdt">${dt.st}</div><div class="sr"><span class="sd ${s.rc?'so':s.st?'sp':'sf'}"></span><span class="st2">回升</span></div><div class="sdt">${dt.rc}</div>`;c.appendChild(card)})}

function rRK(){const c=document.getElementById('rkC'),ins=document.getElementById('iM7');if(!c)return;c.innerHTML='';
  const allE=Object.entries(AC).map(([n,d])=>({n,rs:cRS(d.prices,APS),ry:d.rentYield,yc:cC(d.prices,12),mos:d.monthsOfSupply,pm:d.premiumRate,sh:d.showingIndex,sel:n===selCity}));
  const cd=AC[selCity];if(cd&&cd.property_types)Object.entries(cd.property_types).forEach(([n,v])=>allE.push({n:`${selCity}·${n}`,rs:cRS(v.prices,APS),ry:v.rentYield,yc:cC(v.prices,12),mos:v.monthsOfSupply,pm:v.premiumRate,sh:v.showingIndex,sel:false}));
  const best=allE.reduce((b,e)=>e.rs>b.rs?e:b);const selE=allE.find(e=>e.sel);const rsR=[...allE].sort((a,b)=>b.rs-a.rs);const selRk=rsR.findIndex(e=>e.sel)+1;
  const rkPct=allE.length?(selRk/allE.length*100).toFixed(0):50;
  const rkVerdict=rkPct<=20?'相对强势，跑赢多数城市':rkPct<=50?'中上水平，表现尚可':rkPct<=70?'表现中等，跟随大盘':'相对弱势，恢复可能慢于平均';
  const rkCls=rkPct<=20?'tp':rkPct<=50?'tn':rkPct<=70?'ti':'tng';
  const cj=cd?mktJudge(cd.prices,cd.volumes):{verdict:'—',hint:''};
  if(ins)ins.innerHTML=`<span class="it ${rkCls}">排行·${cj.verdict}</span>RS冠军：<b>${best.n}</b>(${best.rs})。<b>${selCity}</b>排第${selRk}/${allE.length}(前${rkPct}%)，<b>${rkVerdict}</b>。<span style="color:var(--mu);font-size:10px">| ${cj.hint}</span>`;
  function mk(title,sorted,cols){let h=`<div class="rkt"><h4>${title}</h4><table><thead><tr><th>#</th><th>市场</th>`;cols.forEach(c=>h+=`<th>${c.h}</th>`);h+=`</tr></thead><tbody>`;
    sorted.slice(0,15).forEach((e,i)=>{h+=`<tr class="${e.sel?'hl':''}"><td><span class="rn ${i<3?'r'+(i+1):''}">${i+1}</span></td><td class="rktm">${e.sel?'<b>'+e.n+'</b>':e.n}</td>`;cols.forEach(c=>h+=`<td${c.s?` style="${c.s(e)}"`:''}>` +c.f(e)+'</td>');h+=`</tr>`});
    if(!sorted.slice(0,15).find(e=>e.sel)&&selE){const si=sorted.findIndex(e=>e.sel);h+=`<tr class="hl" style="border-top:2px solid var(--b)"><td><span class="rn">${si+1}</span></td><td class="rktm"><b>${selCity}</b></td>`;cols.forEach(c=>h+=`<td${c.s?` style="${c.s(selE)}"`:''}>` +c.f(selE)+'</td>');h+=`</tr>`}
    return h+`</tbody></table></div>`}
  c.innerHTML=mk('RS 相对强度',rsR,[{h:'RS',f:e=>e.rs,s:e=>`font-family:var(--mo);font-weight:600;color:${e.rs>=60?'var(--g)':e.rs>=40?'var(--warm)':'var(--r)'}`},{h:'1年',f:e=>fc(e.yc),s:e=>`color:${e.yc>=0?'var(--g)':'var(--r)'};font-family:var(--mo);font-weight:600`},{h:'去化',f:e=>e.mos+'月',s:()=>'font-family:var(--mo)'}])+mk('租售比',[...allE].sort((a,b)=>b.ry-a.ry),[{h:'收益',f:e=>`+${e.ry}%`,s:()=>'font-family:var(--mo);font-weight:600;color:var(--g)'},{h:'溢价',f:e=>`${(e.pm*100).toFixed(0)}%`,s:()=>'font-family:var(--mo)'},{h:'带看',f:e=>e.sh,s:()=>'font-family:var(--mo)'}])+mk('去化周期',[...allE].sort((a,b)=>a.mos-b.mos),[{h:'去化',f:e=>e.mos+'月',s:()=>'font-family:var(--mo);font-weight:600'},{h:'RS',f:e=>e.rs,s:()=>'font-family:var(--mo)'},{h:'状态',f:e=>`<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:${e.mos<12?'var(--gbg)':e.mos<18?'var(--ybg)':'var(--rbg)'};color:${e.mos<12?'var(--g)':e.mos<18?'var(--warm)':'var(--r)'}">${e.mos<12?'卖方':e.mos<18?'均衡':'买方'}</span>`}])}

// Diagnose vol-price relationship over recent 3 months
function vpDx(ps,vs){
  const n=ps.length;if(n<4)return{tag:'数据不足',cls:'ti',tip:''};
  // 3-month averages vs prior 3-month
  const rp=ps.slice(-3),pp=ps.slice(-6,-3),rv=vs.slice(-3),pv=vs.slice(-6,-3);
  const rpA=rp.reduce((a,b)=>a+b,0)/3,ppA=pp.reduce((a,b)=>a+b,0)/Math.max(1,pp.length);
  const rvA=rv.reduce((a,b)=>a+b,0)/3,pvA=pv.reduce((a,b)=>a+b,0)/Math.max(1,pv.length);
  const pUp=rpA>ppA*1.002,pDn=rpA<ppA*.998,vUp=rvA>pvA*1.05,vDn=rvA<pvA*.95;
  if(pUp&&vUp)return{tag:'量价齐升',cls:'tp',tip:'✅ 最健康信号：涨价有真实成交支撑，上涨可持续'};
  if(pDn&&vUp)return{tag:'放量下跌',cls:'tng',tip:'⚠️ 抛压释放/恐慌出逃，尚未见底，谨慎观望'};
  if(pUp&&vDn)return{tag:'缩量上涨',cls:'tn',tip:'⚠️ 量价背离：涨价缺乏买盘支撑，可能是虚涨，随时回调'};
  if(pDn&&vDn)return{tag:'缩量阴跌',cls:'tng',tip:'🔻 有价无市，观望情绪浓。好消息是抛压也在减小'};
  if(!pUp&&!pDn&&vUp)return{tag:'放量横盘',cls:'tn',tip:'👀 买卖博弈激烈，可能是变盘前兆，密切关注方向'};
  if(!pUp&&!pDn&&vDn)return{tag:'缩量横盘',cls:'ti',tip:'😴 市场冷淡，买卖双方都在等待信号'};
  return{tag:'量价平稳',cls:'ti',tip:'市场相对均衡，暂无明显方向'};
}

function rVP(){dCIP('vp-');const g=document.getElementById('vpG'),t=document.getElementById('m8T'),ins=document.getElementById('iM8');if(!g)return;g.innerHTML='';if(t)t.innerHTML=`📊 ${selCity}·量价关系`;const d=AC[selCity];if(!d)return;
  const tg=[{n:`${selCity}(整体)`,col:d.color,p:d.prices,v:d.volumes}];
  if(d.property_types){const pt=Object.entries(d.property_types);pt.slice(0,2).forEach(([n,v])=>tg.push({n,col:ptC2[n]||'#999',p:v.prices,v:v.volumes}))}
  if(d.hot_zones){const hze=Object.entries(d.hot_zones).sort((a,b)=>b[1].prices[b[1].prices.length-1]-a[1].prices[a[1].prices.length-1]);hze.slice(0,2).forEach(([n,v])=>{const ml=Math.min(v.prices.length,v.volumes.length);tg.push({n,col:CC[tg.length%CC.length],p:v.prices.slice(-ml),v:v.volumes.slice(-ml),mo:v.months})})}
  tg.push({n:'全国大盘',col:'#333',p:NAT.prices,v:NAT.volumes});
  // Smart insight with diagnosis
  const mainDx=vpDx(d.prices,d.volumes);
  const vc0=((d.volumes[d.volumes.length-1]-d.volumes[Math.max(0,d.volumes.length-7)])/(d.volumes[Math.max(0,d.volumes.length-7)]||1)*100).toFixed(0);
  const vpJ=mktJudge(d.prices,d.volumes);
  let streak2=0,dir2=d.prices[d.prices.length-1]>=d.prices[d.prices.length-2]?1:-1;
  for(let i=d.prices.length-1;i>0;i--){if((d.prices[i]>=d.prices[i-1]?1:-1)===dir2)streak2++;else break}
  const durTxt=streak2>=6?'中期趋势':streak2>=3?'短期趋势':'尚未形成趋势';
  const dirTxt=dir2>0?'上行':'下行';
  if(ins)ins.innerHTML=`<span class="it ${mainDx.cls}">${mainDx.tag}·${vpJ.verdict}</span><b>${selCity}</b>近3月${mainDx.tip}。成交量较半年前<b>${vc0>0?'+':''}${vc0}%</b>。<br>趋势持续性：已连续${dir2>0?'上涨':'下跌'}<b>${streak2}</b>月，${durTxt}${dirTxt}。<span style="color:var(--mu);font-size:10px"> | ${vpJ.hint}</span><br><span style="color:var(--mu);font-size:10px">💡 "量在价先"——成交量是领先指标。<span style="color:var(--g)">■绿=价涨</span> <span style="color:var(--r)">■红=价跌</span></span>`;
  tg.forEach((x,i)=>{const cid=`vp-${i}`,div=document.createElement('div');div.className='vpc';
    const dx=vpDx(x.p,x.v);
    div.innerHTML=`<canvas id="${cid}"></canvas><div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;padding:3px 6px;background:var(--bg);border-radius:6px;font-size:10px"><span class="it ${dx.cls}" style="margin:0">${dx.tag}</span><span style="color:var(--mu)">${dx.tip.slice(0,30)}${dx.tip.length>30?'...':''}</span></div>`;
    g.appendChild(div);
    const sl=x.mo?x.mo.slice(-(TP+1)).map(m=>m.length>5?m.slice(2):m):tMO(),ps=tS(x.p),vs=tS(x.v);
    setTimeout(()=>{const cv=document.getElementById(cid);if(!cv)return;const n=ps.length;
      const vCo=vs.map((_,j)=>j===0?'#bbb':ps[j]>=ps[j-1]?'rgba(45,140,78,.5)':'rgba(192,57,43,.3)');
      CI[cid]=new Chart(cv.getContext('2d'),{type:'bar',data:{labels:sl,datasets:[{type:'bar',label:'成交量',data:vs,backgroundColor:vCo,borderRadius:3,yAxisID:'y1',order:2},{type:'line',label:'价格',data:ps,borderColor:x.col,borderWidth:2,pointRadius:1,tension:.3,fill:false,yAxisID:'y',order:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{title:{display:true,text:x.n,font:{size:11,weight:'600'},color:'#333',align:'start'},legend:{labels:{usePointStyle:true,padding:5,font:{size:9}}},tooltip:{callbacks:{label:c=>c.dataset.label==='价格'?`${c.parsed.y.toLocaleString()}元/㎡`:`${c.parsed.y.toLocaleString()}套`}}},scales:{y:{position:'left',ticks:{callback:v=>`${(v/10000).toFixed(1)}万`,font:{size:8}},grid:{color:'#f0f0f0'}},y1:{position:'right',ticks:{callback:v=>v>=1000?`${(v/1000).toFixed(1)}k`:v,font:{size:8}},grid:{display:false}},x:{ticks:{font:{size:8},maxTicksLimit:maxTk()},grid:{display:false}}}}})},150)})}
