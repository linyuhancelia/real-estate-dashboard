<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>房产趋势跟踪看板 v3.0 | Real Estate Trend Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #fafaf8;
  --card-bg: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #555;
  --text-muted: #999;
  --border: #e8e8e4;
  --green: #2d8c4e;
  --green-bg: #e8f5e9;
  --red: #c0392b;
  --red-bg: #fdecea;
  --yellow: #e6a23c;
  --yellow-bg: #fdf6ec;
  --blue: #2980b9;
  --blue-bg: #e3f2fd;
  --hot: #e74c3c;
  --warm: #e6a23c;
  --cold: #3498db;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.1);
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; }
.dashboard { max-width: 1440px; margin: 0 auto; padding: 24px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
.header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
.header .date-badge { background: var(--text); color: var(--bg); padding: 6px 14px; border-radius: 20px; font-size: 12px; font-family: var(--mono); }

.section { margin-bottom: 36px; }
.section-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.section-title .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }

.insight {
  background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
  border-left: 3px solid var(--blue);
  padding: 12px 16px;
  margin-bottom: 16px;
  border-radius: 0 8px 8px 0;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.7;
}
.insight strong { color: var(--text); }
.insight .insight-tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 600;
  margin-right: 6px;
  vertical-align: middle;
}
.tag-positive { background: var(--green-bg); color: var(--green); }
.tag-neutral { background: var(--yellow-bg); color: var(--warm); }
.tag-negative { background: var(--red-bg); color: var(--red); }
.tag-info { background: var(--blue-bg); color: var(--blue); }

.chart-box { background: var(--card-bg); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.chart-box canvas { max-height: 340px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }

.city-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow); border: 1px solid var(--border); transition: box-shadow 0.2s;
}
.city-card:hover { box-shadow: var(--shadow-hover); }
.city-card.primary { border-left: 3px solid var(--red); }
.city-card .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.city-card .city-name { font-size: 16px; font-weight: 700; }
.city-card .card-type-label { font-size: 11px; color: var(--text-muted); }
.city-card .highlight-tag { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: var(--red-bg); color: var(--red); font-weight: 500; margin-left: 6px; }
.temp-badge { padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.temp-hot { background: #fde8e8; color: var(--hot); }
.temp-warm { background: var(--yellow-bg); color: var(--warm); }
.temp-cold { background: #e3f2fd; color: var(--cold); }

.city-card .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.city-card .price { font-size: 28px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; }
.city-card .price-unit { font-size: 12px; color: var(--text-muted); }
.city-card .extra-metrics { display: flex; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.city-card .em { font-size: 11px; color: var(--text-muted); }
.city-card .em b { color: var(--text-secondary); font-weight: 600; }

.city-card .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 16px; margin-bottom: 10px; }
.city-card .metric { display: flex; justify-content: space-between; font-size: 12px; }
.city-card .metric-label { color: var(--text-muted); }
.metric-val-up { color: var(--green); font-weight: 600; font-family: var(--mono); }
.metric-val-down { color: var(--red); font-weight: 600; font-family: var(--mono); }

.city-card .rs-row { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; }
.rs-label { color: var(--text-muted); }
.rs-val { font-family: var(--mono); font-weight: 700; font-size: 20px; }

.city-card .sparkline-container { height: 50px; margin-top: 6px; }
.city-card .sparkline-container canvas { max-height: 50px; }

.area-card {
  background: var(--card-bg); border-radius: var(--radius); padding: 16px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.area-card .ac-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.area-card .ac-name { font-size: 14px; font-weight: 700; }
.area-card .ac-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.area-card .ac-metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px; }
.area-card .am { text-align: center; padding: 6px 2px; background: var(--bg); border-radius: 6px; }
.area-card .am-label { font-size: 9px; color: var(--text-muted); display: block; }
.area-card .am-val { font-size: 14px; font-weight: 700; font-family: var(--mono); }
.area-card .ac-chart { height: 110px; }
.area-card .ac-chart canvas { max-height: 110px; }

.hotzone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.hz-card {
  background: var(--card-bg); border-radius: 8px; padding: 14px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.hz-card .hz-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.hz-card .hz-sub { font-size: 10px; color: var(--text-muted); margin-bottom: 8px; }
.hz-card .hz-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 3px; }
.hz-card .hz-label { color: var(--text-muted); }
.hz-card .hz-chart { height: 60px; margin-top: 6px; }
.hz-card .hz-chart canvas { max-height: 60px; }

.signal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.signal-card { background: var(--card-bg); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.signal-card .signal-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
.signal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 12px; }
.signal-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.signal-on { background: var(--green); box-shadow: 0 0 6px rgba(45,140,78,0.4); }
.signal-pending { background: var(--yellow); box-shadow: 0 0 6px rgba(230,162,60,0.3); }
.signal-off { background: #ddd; }
.signal-text { color: var(--text-secondary); }
.signal-detail { font-size: 11px; color: var(--text-muted); padding-left: 18px; margin-bottom: 2px; }

.rankings-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }
.ranking-table { background: var(--card-bg); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.ranking-table h4 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-secondary); }
.ranking-table table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ranking-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); color: var(--text-muted); font-weight: 500; }
.ranking-table td { padding: 7px 8px; border-bottom: 1px solid #f5f5f5; }
.ranking-table tr:hover td { background: #fafaf8; }
.rank-num { font-family: var(--mono); font-weight: 700; width: 20px; display: inline-block; }
.rank-1 { color: #e6a23c; }
.rank-2 { color: #909399; }
.rank-3 { color: #b87333; }

.vol-price-container { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.vol-price-container canvas { max-height: 260px; }

.methodology { background: var(--card-bg); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); line-height: 1.8; }
.methodology h4 { font-size: 14px; color: var(--text); margin-bottom: 8px; }
.meth-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-top: 12px; }
.meth-block { padding: 12px; background: var(--bg); border-radius: 6px; }
.meth-block h5 { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.meth-block ul { list-style: none; padding: 0; }
.meth-block li { font-size: 11px; padding: 2px 0; color: var(--text-muted); }
.meth-block li::before { content: "·"; margin-right: 6px; font-weight: 700; }
.data-source { margin-top: 16px; padding: 14px; background: #f5f5f0; border-radius: 6px; }
.data-source h5 { font-size: 12px; font-weight: 600; margin-bottom: 6px; }

.footer { text-align: center; font-size: 11px; color: var(--text-muted); padding: 24px 0 12px; border-top: 1px solid var(--border); margin-top: 32px; }

/* Legend box */
.legend-box {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  align-items: center;
  font-size: 11px;
  color: var(--text-muted);
}
.legend-box .legend-title {
  font-weight: 600;
  color: var(--text-secondary);
  font-size: 11px;
  margin-right: 4px;
}
.legend-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink: 0;
}
.legend-swatch {
  display: inline-block;
  width: 24px;
  height: 12px;
  border-radius: 4px;
  vertical-align: middle;
}

/* Loading */
.loading-overlay {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  flex-direction: column;
  gap: 16px;
}
.loading-overlay .spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) {
  .dashboard { padding: 12px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .grid-auto { grid-template-columns: 1fr 1fr; }
  .hotzone-grid { grid-template-columns: 1fr 1fr; }
  .signal-grid { grid-template-columns: 1fr; }
  .rankings-container { grid-template-columns: 1fr; }
  .header { flex-direction: column; gap: 8px; }
  .area-card .ac-metrics { grid-template-columns: repeat(2, 1fr); }
  .meth-grid { grid-template-columns: 1fr; }
  .legend-box { font-size: 10px; gap: 8px; }
}
</style>
</head>
<body>
<div class="dashboard" id="app">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div style="color:var(--text-muted);font-size:13px;">正在加载数据...</div>
  </div>
</div>

<script>
// ============================================================
// DATA LOADING — fetch from latest.json
// ============================================================
let DATA = null;
let MONTHS = [];
let MONTHS_FULL = [];
let NATIONAL = {};
let ALL_CITIES = {};
let PROPERTY_TYPES = {};
let AREA_RINGS = {};
let HOT_ZONES = {};

const CITY_COLORS = [
  '#e74c3c','#c0392b','#8e44ad','#2980b9','#e67e22','#1abc9c','#34495e','#9b59b6',
  '#d4a017','#16a085','#27ae60','#00bcd4','#607d8b','#ff5722','#4caf50','#795548',
  '#ff9800','#009688','#673ab7','#03a9f4','#3f51b5','#8bc34a','#00acc1','#ffc107',
  '#546e7a','#5d4037','#e91e63','#2196f3','#ff6e40','#78909c','#ab47bc','#26a69a',
];
let colorIdx = 0;
function getColor(name) {
  if (name === '上海') return '#e74c3c';
  if (name === '昆山') return '#e91e63';
  if (name === '香港') return '#d4a017';
  return CITY_COLORS[(colorIdx++) % CITY_COLORS.length];
}

async function loadData() {
  try {
    const resp = await fetch('latest.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
  } catch (e) {
    console.error('Failed to load latest.json:', e);
    document.getElementById('loadingOverlay').innerHTML = `
      <div style="color:var(--red);font-size:14px;text-align:center;">
        <strong>数据加载失败</strong><br>
        <span style="font-size:12px;color:var(--text-muted)">请确认 latest.json 文件存在。<br>运行 python3 scripts/fetch_data.py 生成数据。</span>
      </div>`;
    return;
  }

  MONTHS_FULL = DATA.meta.months;
  MONTHS = MONTHS_FULL.map(m => m.slice(2));
  NATIONAL = DATA.national;

  colorIdx = 0;
  for (const [name, city] of Object.entries(DATA.cities)) {
    ALL_CITIES[name] = { ...city, color: getColor(name) };
  }
  for (const [name, pt] of Object.entries(DATA.shanghai_property_types)) {
    const colors = {'老破小':'#e67e22','次新房':'#27ae60','改善大平层':'#2980b9','远郊新房':'#7f8c8d'};
    PROPERTY_TYPES[name] = { ...pt, color: colors[name] || '#999' };
  }
  for (const [name, ar] of Object.entries(DATA.shanghai_area_rings)) {
    const colors = {'市中心':'#c0392b','内环内':'#e74c3c','内中环':'#e67e22','中外环':'#f39c12','外环外':'#95a5a6'};
    AREA_RINGS[name] = { ...ar, color: colors[name] || '#999' };
  }
  for (const [name, hz] of Object.entries(DATA.shanghai_hot_zones)) {
    const colors = {'前滩':'#c0392b','徐汇滨江':'#8e44ad','陆家嘴':'#2c3e50','大虹桥':'#27ae60','张江':'#2980b9','新天地':'#e74c3c'};
    HOT_ZONES[name] = { ...hz, color: colors[name] || '#999' };
  }

  renderDashboard();
}

// ============================================================
// ALGORITHMS (identical to v2.1)
// ============================================================
function calcChange(prices, periods) {
  const n = prices.length;
  const idx = n - 1 - periods;
  if (idx < 0) return 0;
  return ((prices[n - 1] - prices[idx]) / prices[idx]) * 100;
}

function calcSlope(prices, startIdx, endIdx) {
  if (endIdx <= startIdx || startIdx < 0) return 0;
  return (prices[endIdx] - prices[startIdx]) / prices[startIdx] * 100 / (endIdx - startIdx);
}

function calcMomentumChange(prices) {
  const n = prices.length;
  if (n < 7) return 0;
  const recentSlope = calcSlope(prices, n - 4, n - 1);
  const priorSlope = calcSlope(prices, n - 7, n - 4);
  return recentSlope - priorSlope;
}

function calcTrendTemperature(prices, volumes) {
  const n = prices.length;
  const recent3 = calcChange(prices, 3);
  const priceMomentum = Math.max(0, Math.min(100, 50 + recent3 * 15));
  const recentVol = volumes.slice(-3).reduce((a, b) => a + b, 0) / 3;
  const priorSlice = volumes.slice(-9, -3);
  const priorVol = priorSlice.length > 0 ? priorSlice.reduce((a, b) => a + b, 0) / priorSlice.length : recentVol;
  const volRatio = priorVol > 0 ? recentVol / priorVol : 1;
  const volumeMomentum = Math.max(0, Math.min(100, volRatio * 50));
  let consecutive = 0;
  const lastDir = prices[n - 1] >= prices[n - 2] ? 1 : -1;
  for (let i = n - 1; i > 0; i--) {
    if ((prices[i] >= prices[i - 1] ? 1 : -1) === lastDir) consecutive++;
    else break;
  }
  const persistence = Math.max(0, Math.min(100, consecutive * 12 + (lastDir > 0 ? 20 : 0)));
  const score = priceMomentum * 0.4 + volumeMomentum * 0.3 + persistence * 0.3;
  let label, cssClass;
  if (score > 65) { label = '热'; cssClass = 'temp-hot'; }
  else if (score > 35) { label = '平'; cssClass = 'temp-warm'; }
  else { label = '寒'; cssClass = 'temp-cold'; }
  return { score: Math.round(score), label, cssClass };
}

function calcRS(prices, allMarketPrices) {
  const periods = [{ months: 1, weight: 0.4 }, { months: 3, weight: 0.35 }, { months: 12, weight: 0.25 }];
  let wp = 0;
  periods.forEach(({ months, weight }) => {
    const myChg = calcChange(prices, Math.min(months, prices.length - 1));
    const natChg = calcChange(NATIONAL.prices, Math.min(months, NATIONAL.prices.length - 1));
    const myExcess = myChg - natChg;
    const allExcess = allMarketPrices.map(mp => calcChange(mp, Math.min(months, mp.length - 1)) - natChg).sort((a, b) => a - b);
    const rank = allExcess.filter(e => e <= myExcess).length;
    wp += (rank / allExcess.length) * 100 * weight;
  });
  return Math.round(wp);
}

function detectSignals(prices, volumes) {
  const n = prices.length;
  const signals = { stopDecline: false, stabilize: false, recovery: false };
  const details = { stopDecline: '', stabilize: '', recovery: '' };
  if (n >= 4) {
    const c1 = (prices[n-3]-prices[n-4])/prices[n-4]*100;
    const c2 = (prices[n-2]-prices[n-3])/prices[n-3]*100;
    const c3 = (prices[n-1]-prices[n-2])/prices[n-2]*100;
    if (c3 > c2 && c2 > c1) { signals.stopDecline = true; details.stopDecline = `跌幅收窄: ${c1.toFixed(2)}%>${c2.toFixed(2)}%>${c3.toFixed(2)}%`; }
    else if (c3 > c2) { details.stopDecline = `部分收窄: ${c2.toFixed(2)}%>${c3.toFixed(2)}%`; }
    else { details.stopDecline = `未收窄: ${c2.toFixed(2)}%>${c3.toFixed(2)}%`; }
  }
  if (n >= 2) {
    const lc = Math.abs((prices[n-1]-prices[n-2])/prices[n-2]*100);
    const avgV = volumes.slice(-7,-1).reduce((a,b)=>a+b,0)/Math.max(1,volumes.slice(-7,-1).length);
    const lv = volumes[n-1];
    if (lc <= 0.3 && lv >= avgV * 0.8) { signals.stabilize = true; details.stabilize = `波动${lc.toFixed(2)}%, 量能${(lv/avgV*100).toFixed(0)}%`; }
    else { details.stabilize = `波动${lc.toFixed(2)}%, 量能${(lv/(avgV||1)*100).toFixed(0)}%`; }
  }
  if (n >= 3) {
    const cl = (prices[n-1]-prices[n-2])/prices[n-2]*100;
    const cp = (prices[n-2]-prices[n-3])/prices[n-3]*100;
    const av = volumes.slice(-7,-1).reduce((a,b)=>a+b,0)/Math.max(1,volumes.slice(-7,-1).length);
    const ma5 = prices.slice(-5).reduce((a,b)=>a+b,0)/5;
    if (cl > 0 && cp > 0 && volumes[n-1] > av && prices[n-1] > ma5) {
      signals.recovery = true; details.recovery = `连续正涨 ${cp.toFixed(2)}%/${cl.toFixed(2)}%, 量超均值, 价>MA5`;
    } else {
      const r = [];
      if (cl <= 0 || cp <= 0) r.push('未连续正涨');
      if (volumes[n-1] <= av) r.push('量能不足');
      if (prices[n-1] <= ma5) r.push('价<MA5');
      details.recovery = r.join(' · ');
    }
  }
  return { signals, details };
}

function fmtChg(v) { return `${v >= 0 ? '+' : ''}${v.toFixed(1)}%`; }
function fmtChg2(v) { return `${v >= 0 ? '+' : ''}${v.toFixed(2)}%`; }
function chgClass(v) { return v >= 0.05 ? 'metric-val-up' : v <= -0.05 ? 'metric-val-down' : 'metric-val-up'; }

let allPriceSeries = [];

function getTop1City() {
  const entries = Object.entries(ALL_CITIES)
    .filter(([n]) => n !== '上海' && n !== '昆山')
    .map(([name, d]) => ({ name, mc: Math.abs(calcMomentumChange(d.prices)), raw: calcMomentumChange(d.prices), ...d }))
    .sort((a, b) => b.mc - a.mc);
  return entries[0];
}

function renderInsight(id, html) { document.getElementById(id).innerHTML = html; }

// ============================================================
// LEGEND BUILDER HELPER
// ============================================================
function buildLegendHTML(items) {
  let html = '<div class="legend-box"><span class="legend-title">图例说明</span>';
  items.forEach(item => {
    if (item.type === 'dot') {
      html += `<span class="legend-item"><span class="legend-dot" style="background:${item.color};${item.glow?'box-shadow:0 0 6px '+item.color+'66':''}"></span>${item.label}</span>`;
    } else if (item.type === 'badge') {
      html += `<span class="legend-item"><span class="temp-badge ${item.cssClass}" style="padding:1px 6px;font-size:10px">${item.text}</span>${item.label}</span>`;
    } else if (item.type === 'swatch') {
      html += `<span class="legend-item"><span class="legend-swatch" style="background:${item.color}"></span>${item.label}</span>`;
    } else if (item.type === 'text') {
      html += `<span class="legend-item" style="color:${item.color||'var(--text-muted)'}"><strong>${item.text}</strong> ${item.label}</span>`;
    }
  });
  html += '</div>';
  return html;
}

    const rs = calcRS(d.prices, allPriceSeries);

// --- M6: Signal Detection ---
function renderSignals() {
  const container = document.getElementById('signalGrid');
  const targets = [
    { name: '上海(整体)', type: '城市', ...ALL_CITIES['上海'] },
    { name: '昆山', type: '城市', ...ALL_CITIES['昆山'] },
    ...Object.entries(PROPERTY_TYPES).map(([n,d]) => ({ name: `沪·${n}`, type: '物业', ...d })),
    ...Object.entries(HOT_ZONES).map(([n,d]) => ({ name: `沪·${n}`, type: '板块', ...d })),
  ];

  const onCount = targets.filter(t => detectSignals(t.prices, t.volumes).signals.stopDecline).length;
  const stbCount = targets.filter(t => detectSignals(t.prices, t.volumes).signals.stabilize).length;
  const recCount = targets.filter(t => detectSignals(t.prices, t.volumes).signals.recovery).length;

  renderInsight('insightM6',
    `<span class="insight-tag ${recCount > 0 ? 'tag-positive' : stbCount > 2 ? 'tag-neutral' : 'tag-negative'}">信号汇总</span>` +
    `当前监测的${targets.length}个市场中：<strong>${onCount}个</strong>触发止跌信号，<strong>${stbCount}个</strong>确认走平，<strong>${recCount}个</strong>进入回升通道。` +
    (recCount > 0 ? ` 已有市场进入右侧交易窗口，值得重点关注。` :
     stbCount > 2 ? ` 多数细分市场处于"左侧止跌→走平确认"阶段，建议持续跟踪量价配合信号。` :
     ` 整体仍在筑底期，右侧信号尚未确认，建议耐心等待。`)
  );

  document.getElementById('legendM6').innerHTML = buildLegendHTML([
    { type: 'dot', color: 'var(--green)', glow: true, label: '绿灯 = 信号已触发(条件全部满足)' },
    { type: 'dot', color: 'var(--yellow)', glow: true, label: '黄灯 = 前置信号已满足(等待确认)' },
    { type: 'dot', color: '#ddd', glow: false, label: '灰灯 = 信号未触发' },
    { type: 'text', text: '三阶段:', label: '止跌(左侧观察) → 走平(确认) → 回升(右侧行动)', color: 'var(--text-secondary)' },
  ]);

  targets.forEach(target => {
    const { signals, details } = detectSignals(target.prices, target.volumes);
    const card = document.createElement('div');
    card.className = 'signal-card';
    card.innerHTML = `
      <div class="signal-name">${target.name} <span style="font-size:10px;color:var(--text-muted)">${target.type}</span></div>
      <div class="signal-row"><span class="signal-dot ${signals.stopDecline?'signal-on':'signal-off'}"></span><span class="signal-text">止跌 (左侧)</span></div>
      <div class="signal-detail">${details.stopDecline}</div>
      <div class="signal-row"><span class="signal-dot ${signals.stabilize?'signal-on':signals.stopDecline?'signal-pending':'signal-off'}"></span><span class="signal-text">走平 (确认)</span></div>
      <div class="signal-detail">${details.stabilize}</div>
      <div class="signal-row"><span class="signal-dot ${signals.recovery?'signal-on':signals.stabilize?'signal-pending':'signal-off'}"></span><span class="signal-text">回升 (右侧)</span></div>
      <div class="signal-detail">${details.recovery}</div>
    `;
    container.appendChild(card);
  });
}

          },
          scales: {
            y: { position: 'left', ticks: { callback: v => `${(v/10000).toFixed(1)}万`, font: { size: 10 } }, grid: { color: '#f0f0f0' } },
            y1: { position: 'right', ticks: { callback: v => v >= 1000 ? `${(v/1000).toFixed(1)}k` : v, font: { size: 10 } }, grid: { display: false } },
            x: { ticks: { font: { size: 10 } }, grid: { display: false } },
          },
        },
      });
    }, 150);
  });
}

loadData();
